<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gift Log — @hackystreaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0d14;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }


        /* ── FEED ── */
        #feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scroll-behavior: smooth;
        }

        #feed::-webkit-scrollbar {
            width: 4px;
        }

        #feed::-webkit-scrollbar-track {
            background: transparent;
        }

        #feed::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* ── GIFT ROW ── */
        .gift-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            animation: rowIn 0.25s ease-out forwards;
            transition: background 0.15s;
        }

        .gift-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* tier accent left border */
        .gift-row.tier-cheap {
            border-left: 3px solid #555;
        }

        .gift-row.tier-low {
            border-left: 3px solid #ff2d55;
        }

        .gift-row.tier-mid {
            border-left: 3px solid #ff9a3c;
        }

        .gift-row.tier-high {
            border-left: 3px solid #ffd700;
        }

        .gift-row.tier-whale {
            border-left: 3px solid #c084fc;
        }

        .gift-img-wrap {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }

        .gift-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .gift-info {
            flex: 1;
            min-width: 0;
        }

        .gifter-name {
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            opacity: 0.9;
        }

        .gift-name {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .gift-coins {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .gift-coins.streak-update {
            color: #fff;
        }

        .gift-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            width: 36px;
            text-align: right;
        }

        /* ── EMPTY STATE ── */
        #empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            user-select: none;
        }

        #empty .icon {
            font-size: 32px;
            opacity: 0.4;
        }

        /* ── BOTTOM BAR ── */
    </style>
</head>

<body>


    <div id="feed">
        <div id="empty">
            <div class="icon">🎁</div>
            <div>Waiting for gifts…</div>
        </div>
    </div>

    <script>
        /* ── constants ── */
        const MAX_ROWS = 200;
        const streakRows = new Map();
        let totalGifts = 0;
        let totalCoins = 0;
        const gifters = new Set();
        const COIN_SVG = `<svg width="14" height="14" viewBox="0 0 20 20" style="vertical-align:middle;margin-right:3px;margin-bottom:2px;"><circle cx="10" cy="10" r="9" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.5)" stroke-width="2"/><circle cx="10" cy="10" r="4" fill="rgba(255, 255, 255, 0.8)"/></svg>`;

        /* ── helpers ── */
        function fmtCoins(n) {
            if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
            return String(n);
        }
        function fmtTime(d) {
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }
        function tierClass(coins) {
            if (coins >= 10000) return 'tier-whale';
            if (coins >= 1000) return 'tier-high';
            if (coins >= 100) return 'tier-mid';
            if (coins >= 10) return 'tier-low';
            return 'tier-cheap';
        }
        function scrollToBottom() {
            const feed = document.getElementById('feed');
            feed.scrollTop = feed.scrollHeight;
        }
        function removeEmpty() {
            const e = document.getElementById('empty');
            if (e) e.remove();
        }
        function pruneRows() {
            const feed = document.getElementById('feed');
            const rows = feed.querySelectorAll('.gift-row');
            if (rows.length > MAX_ROWS)
                for (let i = 0; i < rows.length - MAX_ROWS; i++) rows[i].remove();
        }

        /* ══════════════════════════════
           ADD A NEW ROW
        ══════════════════════════════ */
        function addRow({ username, giftName, coins, pictureUrl, streakKey }) {
            removeEmpty();

            const row = document.createElement('div');
            row.className = `gift-row ${tierClass(coins)}`;
            if (streakKey) {
                row.dataset.streakKey = streakKey;
                row.dataset.coins = coins;
            }

            const imgContent = pictureUrl
                ? `<img src="${pictureUrl}" onerror="this.parentElement.textContent='🎁'" />`
                : '🎁';

            row.innerHTML = `
        <div class="gift-img-wrap">${imgContent}</div>
        <div class="gift-info">
          <div class="gift-name">${esc(giftName)}</div>
          <div class="gifter-name">by @${esc(username)}</div>
        </div>
        <div class="gift-coins">${COIN_SVG}${fmtCoins(coins)}</div>
        <div class="gift-time">${fmtTime(new Date())}</div>
      `;

            document.getElementById('feed').appendChild(row);
            pruneRows();
            scrollToBottom();
            return row;
        }

        /* ══════════════════════════════
           UPDATE STREAK ROW (live count)
        ══════════════════════════════ */
        function updateRow(streakKey, coins) {
            const row = streakRows.get(streakKey);
            if (!row) return;
            const prev = parseInt(row.dataset.coins || '0', 10);
            const diff = coins - prev;
            if (diff <= 0) return;
            row.dataset.coins = coins;

            // Update coin display
            const coinEl = row.querySelector('.gift-coins');
            if (coinEl) {
                coinEl.innerHTML = Object.assign(document.createElement('div'), { innerHTML: COIN_SVG }).innerHTML + fmtCoins(coins);
                coinEl.classList.add('streak-update');
                setTimeout(() => coinEl.classList.remove('streak-update'), 400);
            }

            // Update tier border
            row.className = `gift-row ${tierClass(coins)}`;
        }

        /* ══════════════════════════════
           SSE CONNECTION
        ══════════════════════════════ */
        function connect() {
            const base = window.location.origin;

            const es = new EventSource(`${base}/events`);

            es.addEventListener('connected', () => { });
            es.addEventListener('offline', () => { });

            es.addEventListener('gift', e => {
                try {
                    const d = JSON.parse(e.data);
                    const username = d.nickname || d.uniqueId || 'Someone';
                    const giftName = d.giftName || 'Gift';
                    const coins = d.coins || 1;
                    const streakKey = d.streakKey || '';
                    const pictureUrl = d.pictureUrl || '';

                    totalGifts++;
                    totalCoins += coins;
                    gifters.add(username.toLowerCase());

                    const row = addRow({ username, giftName, coins, pictureUrl, streakKey });
                    if (streakKey) streakRows.set(streakKey, row);
                } catch (_) { }
            });

            es.addEventListener('gift_update', e => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.streakKey) updateRow(d.streakKey, d.coins || 0);
                } catch (_) { }
            });

            es.addEventListener('gift_end', e => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.streakKey) {
                        updateRow(d.streakKey, d.coins || 0);
                        streakRows.delete(d.streakKey);
                    }
                } catch (_) { }
            });

            es.onerror = () => { };
        }



        function esc(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        connect();
    </script>
</body>

</html>
