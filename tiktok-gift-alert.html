<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Gift Alerts</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      width: 100vw;
      height: 100vh;
    }

    /* ─── ALERT CONTAINER ─── */
    #alert-container {
      position: fixed;
      top: 60px;
      right: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
      pointer-events: none;
      z-index: 999;
    }

    /* ─── CARD ─── */
    .gift-alert {
      position: relative;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 28px 20px 20px;
      border-radius: 26px;
      min-width: 460px;
      max-width: 560px;
      opacity: 0;
      transform: translateX(140px) scale(0.85);
      animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
        cardOut 0.45s ease-in forwards var(--hold-time, 4.5s);
      will-change: transform, opacity;
      background: linear-gradient(135deg, rgba(18, 18, 32, 0.97), rgba(8, 8, 18, 0.99));
      box-shadow:
        0 0 0 1.5px rgba(255, 255, 255, 0.07),
        0 16px 60px rgba(0, 0, 0, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      overflow: visible;
      /* so flames/effects can overflow */
    }

    /* Gradient border */
    .gift-alert::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 26px;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--c1), var(--c2), var(--c1));
      background-size: 200% 200%;
      animation: borderSpin 2.5s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow overlay */
    .gift-alert::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: radial-gradient(circle at 18% 50%, var(--c1-soft) 0%, transparent 65%);
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    /* ─── ICON ─── */
    .alert-icon {
      position: relative;
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      box-shadow: 0 6px 28px var(--c1-soft);
      animation: iconPop 0.6s cubic-bezier(0.34, 1.7, 0.64, 1) 0.1s both;
      z-index: 1;
      overflow: visible;
    }

    .gift-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 9px;
      border-radius: 22px;
      display: block;
    }

    .gift-emoji-fallback {
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Count badge */
    .count-badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: linear-gradient(135deg, #ff2d55, #ff6b00);
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 0.5px;
      min-width: 32px;
      height: 32px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 7px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
      border: 2.5px solid rgba(8, 8, 18, 0.99);
      z-index: 4;
      animation: badgePop 0.4s cubic-bezier(0.34, 2.2, 0.64, 1) 0.3s both;
      transform-origin: center;
    }

    /* ─── TEXT ─── */
    .alert-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 1;
      flex: 1;
      min-width: 0;
    }

    .alert-username {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 1.5px;
      color: #fff;
      text-shadow: 0 0 20px var(--c1-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    .alert-gift-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 21px;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 6px var(--c1-soft));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alert-subtext {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.45);
    }

    /* ─── COINS ─── */
    .alert-coins {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.25);
      border-radius: 30px;
      padding: 7px 16px;
      flex-shrink: 0;
      z-index: 1;
      animation: coinSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
    }

    .coin-icon {
      font-size: 17px;
    }

    .coin-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 21px;
      color: #ffd700;
      letter-spacing: 1px;
      text-shadow: 0 0 14px rgba(255, 215, 0, 0.65);
      transition: all 0.15s;
    }

    /* ─── PROGRESS BAR ─── */
    .alert-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      border-radius: 0 0 26px 26px;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      animation: shrink var(--total-time, 5s) linear forwards;
      transform-origin: left;
      width: 100%;
      z-index: 1;
    }

    /* ─── PARTICLES ─── */
    .particles-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 26px;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur) ease-out var(--delay) infinite;
    }

    /* ─── TIKTOK MARK ─── */
    .tiktok-mark {
      position: absolute;
      top: 12px;
      right: 16px;
      opacity: 0.18;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      z-index: 1;
    }

    /* ════════════════════════════════════
   FIRE EFFECTS
════════════════════════════════════ */
    .fire-wrap {
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }

    .flame {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 30% 30%;
      transform-origin: bottom center;
      animation: flameFly var(--fdur, 0.9s) ease-out var(--fdelay, 0s) infinite;
      opacity: 0;
      filter: blur(var(--fblur, 1px));
    }

    .fire-t1 .flame {
      width: var(--fw, 9px);
      height: var(--fh, 16px);
      background: radial-gradient(ellipse at 50% 80%, #ff6b00, #ff2d00 60%, transparent 100%);
      box-shadow: 0 0 7px 2px rgba(255, 80, 0, 0.5);
    }

    .fire-t2 .flame {
      width: var(--fw, 13px);
      height: var(--fh, 25px);
      background: radial-gradient(ellipse at 50% 80%, #ffe000, #ff6b00 50%, #ff2d00 80%, transparent 100%);
      box-shadow: 0 0 12px 3px rgba(255, 140, 0, 0.6);
    }

    .fire-t3 .flame {
      width: var(--fw, 18px);
      height: var(--fh, 36px);
      background: radial-gradient(ellipse at 50% 70%, #fff 0%, #ffe000 30%, #ff6b00 60%, #ff2d00 85%, transparent 100%);
      box-shadow: 0 0 18px 6px rgba(255, 180, 0, 0.7), 0 0 34px 9px rgba(255, 80, 0, 0.35);
    }

    @keyframes flameFly {
      0% {
        opacity: 0;
        transform: translateY(0) scaleX(1) rotate(var(--frot, 0deg));
      }

      15% {
        opacity: 0.9;
      }

      60% {
        opacity: 0.6;
        transform: translateY(var(--frise, -45px)) scaleX(0.7) rotate(calc(var(--frot, 0deg)*-0.5));
      }

      100% {
        opacity: 0;
        transform: translateY(var(--fmax, -75px)) scaleX(0.2) rotate(calc(var(--frot, 0deg)*0.3));
      }
    }

    .gift-alert.fire-t1 {
      box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.07), 0 16px 60px rgba(0, 0, 0, 0.65), 0 0 35px rgba(255, 100, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .gift-alert.fire-t2 {
      box-shadow: 0 0 0 1.5px rgba(255, 200, 0, 0.3), 0 16px 60px rgba(0, 0, 0, 0.65), 0 0 55px rgba(255, 140, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .gift-alert.fire-t3 {
      box-shadow: 0 0 0 2px rgba(255, 220, 0, 0.5), 0 16px 70px rgba(0, 0, 0, 0.7), 0 0 90px rgba(255, 180, 0, 0.52), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* ════════════════════════════════════
   STREAK / BOOST EFFECTS
════════════════════════════════════ */

    /* Live count bump on the card */
    @keyframes cardBump {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.045);
      }

      100% {
        transform: scale(1);
      }
    }

    .card-bump {
      animation: cardBump 0.22s cubic-bezier(0.34, 1.7, 0.64, 1) !important;
    }

    /* Count badge bump */
    @keyframes badgeBump {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.6);
      }

      100% {
        transform: scale(1);
      }
    }

    .badge-bump {
      animation: badgeBump 0.2s cubic-bezier(0.34, 2, 0.64, 1) !important;
    }

    /* Combo text flies up above card */
    .streak-combo {
      position: absolute;
      left: 50%;
      top: -14px;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', cursive;
      font-size: var(--combo-size, 48px);
      letter-spacing: 2px;
      color: var(--combo-color, #ff9a3c);
      text-shadow: 0 0 24px var(--combo-color, #ff9a3c), 0 0 48px var(--combo-color, #ff9a3c), 2px 2px 0 rgba(0, 0, 0, 0.5);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      animation: comboFlyUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes comboFlyUp {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px) scale(0.4);
      }

      15% {
        opacity: 1;
        transform: translateX(-50%) translateY(-12px) scale(1.35);
      }

      40% {
        opacity: 1;
        transform: translateX(-50%) translateY(-22px) scale(1.0);
      }

      70% {
        opacity: 1;
        transform: translateX(-50%) translateY(-30px) scale(1.0);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-65px) scale(0.8);
      }
    }

    /* Milestone label */
    .streak-label {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-family: 'Bebas Neue', cursive;
      font-size: 14px;
      letter-spacing: 3px;
      padding: 3px 13px;
      border-radius: 20px;
      z-index: 4;
      white-space: nowrap;
      pointer-events: none;
      animation: labelPop 0.4s cubic-bezier(0.34, 1.7, 0.64, 1) forwards;
    }

    .streak-label.s1 {
      background: rgba(255, 150, 0, 0.22);
      color: #ff9a3c;
      border: 1px solid rgba(255, 150, 0, 0.45);
    }

    .streak-label.s2 {
      background: rgba(255, 50, 50, 0.22);
      color: #ff5555;
      border: 1px solid rgba(255, 50, 50, 0.45);
    }

    .streak-label.s3 {
      background: rgba(180, 0, 255, 0.22);
      color: #cc44ff;
      border: 1px solid rgba(180, 0, 255, 0.45);
    }

    .streak-label.s4 {
      background: rgba(255, 215, 0, 0.22);
      color: #ffd700;
      border: 1px solid rgba(255, 215, 0, 0.55);
      text-shadow: 0 0 10px #ffd700;
    }

    @keyframes labelPop {
      from {
        opacity: 0;
        transform: scale(0.5);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Shockwave ring */
    .shockwave {
      position: absolute;
      inset: -4px;
      border-radius: 30px;
      border: 3px solid var(--sw-color, #ff9a3c);
      pointer-events: none;
      z-index: 5;
      animation: shockExpand var(--sw-dur, 0.7s) ease-out forwards;
    }

    @keyframes shockExpand {
      0% {
        opacity: 0.95;
        transform: scale(1);
        filter: blur(0);
      }

      100% {
        opacity: 0;
        transform: scale(3.5);
        filter: blur(15px);
      }
    }

    /* Lightning bolt */
    .bolt {
      position: absolute;
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, #fff 0%, #ffe000 40%, var(--bolt-color, #ff9a3c) 100%);
      box-shadow: 0 0 8px 2px #ffe000, 0 0 18px 4px var(--bolt-color, #ff9a3c);
      transform-origin: top center;
      opacity: 0;
      animation: boltFlash var(--b-dur, 0.22s) ease-out var(--b-delay, 0s) forwards;
    }

    @keyframes boltFlash {
      0% {
        opacity: 0;
        transform: scaleY(0) rotate(var(--b-rot, 0deg));
      }

      20% {
        opacity: 1;
        transform: scaleY(1) rotate(var(--b-rot, 0deg));
      }

      80% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
        transform: scaleY(1) rotate(var(--b-rot, 0deg));
      }
    }

    /* Tier glow overrides */
    .gift-alert.streak-s1 {
      box-shadow: 0 0 0 2px rgba(255, 150, 0, 0.5), 0 16px 60px rgba(255, 100, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .gift-alert.streak-s2 {
      box-shadow: 0 0 0 2px rgba(255, 50, 50, 0.6), 0 16px 70px rgba(255, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .gift-alert.streak-s3 {
      box-shadow: 0 0 0 2px rgba(180, 0, 255, 0.7), 0 16px 80px rgba(150, 0, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, cardOut 0.45s ease-in forwards var(--hold-time, 4.5s), pulseS3 1s ease-in-out infinite alternate;
    }

    .gift-alert.streak-s4 {
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.9), 0 16px 100px rgba(255, 180, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, cardOut 0.45s ease-in forwards var(--hold-time, 4.5s), pulseS4 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulseS3 {
      from {
        box-shadow: 0 0 0 2px rgba(180, 0, 255, 0.7), 0 16px 80px rgba(150, 0, 255, 0.5);
      }

      to {
        box-shadow: 0 0 0 3px rgba(200, 0, 255, 0.95), 0 16px 110px rgba(180, 0, 255, 0.75);
      }
    }

    @keyframes pulseS4 {
      from {
        box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.9), 0 16px 100px rgba(255, 180, 0, 0.65);
      }

      to {
        box-shadow: 0 0 0 5px rgba(255, 235, 0, 1.0), 0 16px 140px rgba(255, 210, 0, 0.9);
      }
    }

    /* Screen shake */
    @keyframes screenShake {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      10% {
        transform: translate(-5px, -2px) rotate(-0.5deg);
      }

      20% {
        transform: translate(5px, 2px) rotate(0.5deg);
      }

      30% {
        transform: translate(-4px, 3px) rotate(0deg);
      }

      40% {
        transform: translate(4px, -3px) rotate(0.3deg);
      }

      50% {
        transform: translate(-2px, 2px) rotate(-0.2deg);
      }

      70% {
        transform: translate(2px, 1px) rotate(0.1deg);
      }
    }

    #alert-container.shake {
      animation: screenShake 0.5s ease-in-out;
    }

    /* ════════════════════════════════════
   BASE KEYFRAMES
════════════════════════════════════ */
    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateX(140px) scale(0.85);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes cardOut {
      0% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }

      80% {
        opacity: 0;
        transform: translateX(35px) scale(0.95);
      }

      100% {
        opacity: 0;
        transform: translateX(70px) scale(0.9);
      }
    }

    @keyframes borderSpin {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes iconPop {
      from {
        transform: scale(0) rotate(-20deg);
      }

      to {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes badgePop {
      from {
        transform: scale(0);
      }

      to {
        transform: scale(1);
      }
    }

    @keyframes coinSlide {
      from {
        transform: translateX(22px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes shrink {
      from {
        transform: scaleX(1);
      }

      to {
        transform: scaleX(0);
      }
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }

      20% {
        opacity: 0.7;
      }

      100% {
        opacity: 0;
        transform: translateY(-65px) scale(0.3);
      }
    }

    /* ─── SCREEN FLASH ─── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 70% 80%, rgba(255, 75, 120, 0.18), transparent 60%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s ease;
      z-index: 998;
    }

    #flash.active {
      opacity: 1;
    }

    /* ─── CONFIG PANEL (Hidden for OBS) ─── */
    #config-panel {
      display: none;
    }

    #config-panel button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(255, 45, 85, 0.5);
    }

    #config-panel .streak-btn {
      background: linear-gradient(135deg, #5c35cc, #ff6b00);
    }

    #config-panel .connect-btn {
      background: linear-gradient(135deg, #0070f3, #5c35cc);
      margin-bottom: 0;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      vertical-align: middle;
      transition: background .3s;
    }

    #status-dot.connected {
      background: #00d26a;
      box-shadow: 0 0 8px #00d26a;
    }

    #status-dot.error {
      background: #ff2d55;
      box-shadow: 0 0 8px #ff2d55;
    }

    #status-text {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }

    body.obs-mode #config-panel {
      display: none !important;
    }

    /* ─── NEW GIFT BADGE ─── */
    .new-gift-badge {
      position: absolute;
      top: -12px;
      left: 18px;
      background: linear-gradient(135deg, #ff2d55, #ff9a3c);
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 3px 12px;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 14px rgba(255, 45, 85, 0.7), 0 3px 10px rgba(0, 0, 0, 0.4);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      animation: newGiftPulse 1s ease-in-out infinite alternate;
      white-space: nowrap;
    }

    @keyframes newGiftPulse {
      from { box-shadow: 0 0 10px rgba(255, 45, 85, 0.6); }
      to   { box-shadow: 0 0 22px rgba(255, 154, 60, 0.9); }
    }

    /* ════════════════════════════════════
   BIG GIFT EFFECTS (500+ coins)
════════════════════════════════════ */

    /* 1. Gold shimmer sweep — single pass across the card */
    .big-gift-sweep {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }
    .big-gift-sweep::after {
      content: '';
      position: absolute;
      top: -20%; bottom: -20%;
      width: 28%;
      left: -35%;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,215,0,0.45),
        rgba(255,255,255,0.22),
        rgba(255,215,0,0.45),
        transparent);
      transform: skewX(-14deg);
      animation: bigGiftSweep 0.9s cubic-bezier(0.4,0,0.2,1) 0.08s forwards;
    }
    @keyframes bigGiftSweep {
      from { left: -35%; }
      to   { left: 140%; }

    /* ─────────────────────────────────────────
       LIVE GIFT DB  (populated from server /gift-db + SSE gift_db)
       Covers all TikTok regions + seasonal gifts automatically.
       Keys: giftId (string) → { id, name, coins, img }
    ───────────────────────────────────────── */
    const liveGiftDb = {}; // giftId → { id, name, coins, img }

    // Pick a gradient palette based on coin value alone
    function coinsToPalette(coins) {
      if (coins >= 30000) return { c1: '#5c35cc', c2: '#ff2d55' };  // universe tier
      if (coins >= 10000) return { c1: '#ff9a3c', c2: '#ffd700' };  // lion tier
      if (coins >= 5000) return { c1: '#5c35cc', c2: '#00cfff' };  // diamond tier
      if (coins >= 1000) return { c1: '#ffd700', c2: '#ff6b00' };  // crown tier
      if (coins >= 500) return { c1: '#ff6b00', c2: '#ffd700' };  // mid
      if (coins >= 100) return { c1: '#5c35cc', c2: '#69c9d0' };  // galaxy tier
      if (coins >= 50) return { c1: '#ffd700', c2: '#ff9a3c' };  // star tier
      if (coins >= 10) return { c1: '#ff2d55', c2: '#ff6b9d' };  // heart tier
      return { c1: '#ff2d55', c2: '#ff9a3c' };  // cheap
    }

    function loadLiveGiftDb(db) {
      let count = 0;
      for (const [id, g] of Object.entries(db)) {
        liveGiftDb[id] = g;
        count++;
      }
      console.log(`[GiftDB] ✅ Live DB loaded: ${count} gifts`);
    }

    // Fetch on page load (works immediately when served from same origin)
    async function fetchLiveGiftDb() {
      try {
        const base = document.getElementById('input-proxy').value.trim().replace(/\/$/, '') || window.location.origin;
        const res = await fetch(`${base}/gift-db`);
        const json = await res.json();
        if (json.fetched && json.db) loadLiveGiftDb(json.db);
      } catch (e) { /* silent fail, will receive via SSE gift_db too */ }
    }
    setTimeout(fetchLiveGiftDb, 1000);

    function getGiftInfo(name, giftId) {
      // 1. Check live DB by giftId first (covers all TikTok gifts, all regions)
      if (giftId) {
        const live = liveGiftDb[String(giftId)];
        if (live) {
          const pal = coinsToPalette(live.coins || 0);
          return { emoji: '🎁', ...pal, coins: live.coins || 1, name: live.name || name, isNew: false, liveImg: live.img || '' };
        }
      }
      // 2. Check static GIFT_DATA by name substring
      const key = (name || '').toLowerCase();
      for (const [k, v] of Object.entries(GIFT_DATA)) {
        if (k !== 'default' && key.includes(k)) return { ...v, name, isNew: false, liveImg: '' };
      }
      // 3. Unknown gift — flag it
      return { ...GIFT_DATA['default'], name, isNew: true, liveImg: '' };
    }

    /* ═══════════════════════════════════════
       SOUND ENGINE
    ═══════════════════════════════════════ */
    let _actx = null;
    function getACtx() {
      if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
      if (_actx.state === 'suspended') _actx.resume();
      return _actx;
    }
    const SOUNDS = {
      sparkle(vol = 0.55) {
        const ctx = getACtx(), t = ctx.currentTime;
        [0, 0.06, 0.13, 0.21, 0.30].forEach((d, i) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination); o.type = 'sine';
          o.frequency.value = 2093 * Math.pow(1.12, i);
          g.gain.setValueAtTime(0, t + d); g.gain.linearRampToValueAtTime(vol * 0.2, t + d + 0.008);
          g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.28); o.start(t + d); o.stop(t + d + 0.3);
        });
      },
      levelup(vol = 0.55) {
        const ctx = getACtx(), t = ctx.currentTime;
        [[523, 0], [659, .11], [784, .22], [1047, .33], [1319, .46]].forEach(([f, d]) => {
          ['square', 'sine'].forEach((type, j) => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination); o.type = type;
            o.frequency.value = f * (j === 1 ? 2 : 1);
            g.gain.setValueAtTime(0, t + d); g.gain.linearRampToValueAtTime(vol * (j === 0 ? .12 : .06), t + d + .008);
            g.gain.exponentialRampToValueAtTime(0.001, t + d + .2); o.start(t + d); o.stop(t + d + .22);
          });
        });
      },
      fanfare(vol = 0.55) {
        const ctx = getACtx(), t = ctx.currentTime;
        [[523, 0], [659, .13], [784, .26], [1047, .42], [784, .58], [1047, .72]].forEach(([f, d]) => {
          ['sawtooth', 'square'].forEach((type, j) => {
            const o = ctx.createOscillator(), g = ctx.createGain(), fi = ctx.createBiquadFilter();
            fi.type = 'lowpass'; fi.frequency.value = 2000;
            o.connect(fi); fi.connect(g); g.connect(ctx.destination); o.type = type;
            o.frequency.value = f * (j === 1 ? 1.005 : 1);
            g.gain.setValueAtTime(0, t + d); g.gain.linearRampToValueAtTime(vol * (j === 0 ? .1 : .05), t + d + .015);
            g.gain.exponentialRampToValueAtTime(0.001, t + d + .22); o.start(t + d); o.stop(t + d + .25);
          });
        });
      },
      // ⚡ Power Up — rising synth whoosh, plays once when a streak starts
      powerup(vol = 0.6) {
        const ctx = getACtx(), t = ctx.currentTime;
        // Rising sweep
        const o1 = ctx.createOscillator(), g1 = ctx.createGain();
        o1.connect(g1); g1.connect(ctx.destination);
        o1.type = 'sawtooth';
        o1.frequency.setValueAtTime(180, t);
        o1.frequency.exponentialRampToValueAtTime(1400, t + 0.35);
        g1.gain.setValueAtTime(0, t);
        g1.gain.linearRampToValueAtTime(vol * 0.18, t + 0.03);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        o1.start(t); o1.stop(t + 0.5);
        // Punchy click at start
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'square';
        o2.frequency.setValueAtTime(80, t);
        o2.frequency.exponentialRampToValueAtTime(600, t + 0.08);
        g2.gain.setValueAtTime(vol * 0.25, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o2.start(t); o2.stop(t + 0.15);
        // Bright shimmer on top
        const o3 = ctx.createOscillator(), g3 = ctx.createGain();
        o3.connect(g3); g3.connect(ctx.destination);
        o3.type = 'sine';
        o3.frequency.setValueAtTime(1200, t + 0.1);
        o3.frequency.exponentialRampToValueAtTime(2600, t + 0.4);
        g3.gain.setValueAtTime(0, t + 0.1);
        g3.gain.linearRampToValueAtTime(vol * 0.12, t + 0.18);
        g3.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        o3.start(t + 0.1); o3.stop(t + 0.5);
      },
    };
    // ─── Epic Century sound: multi-layer orchestral hit + rising shimmer
    function playCenturySound() {
      if (!SOUND_ENABLED) return;
      const ctx = getACtx(), t = ctx.currentTime;
      // Bass thud
      const b = ctx.createOscillator(), bg = ctx.createGain();
      b.connect(bg); bg.connect(ctx.destination); b.type = 'sine';
      b.frequency.setValueAtTime(55, t); b.frequency.exponentialRampToValueAtTime(35, t+0.35);
      bg.gain.setValueAtTime(SOUND_VOL*0.6, t); bg.gain.exponentialRampToValueAtTime(0.001, t+0.55);
      b.start(t); b.stop(t+0.6);
      // Mid brass chord
      [196, 247, 294, 370].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain(), fi = ctx.createBiquadFilter();
        fi.type = 'lowpass'; fi.frequency.value = 2200;
        o.connect(fi); fi.connect(g); g.connect(ctx.destination); o.type = 'sawtooth';
        o.frequency.setValueAtTime(f, t + i*0.025);
        g.gain.setValueAtTime(0, t+i*0.025); g.gain.linearRampToValueAtTime(SOUND_VOL*0.13, t+i*0.025+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.7+i*0.08); o.start(t+i*0.025); o.stop(t+0.9);
      });
      // Rising shimmer sweep
      const s = ctx.createOscillator(), sg = ctx.createGain();
      s.connect(sg); sg.connect(ctx.destination); s.type = 'sine';
      s.frequency.setValueAtTime(600, t+0.05); s.frequency.exponentialRampToValueAtTime(4000, t+0.65);
      sg.gain.setValueAtTime(0, t+0.05); sg.gain.linearRampToValueAtTime(SOUND_VOL*0.14, t+0.1);
      sg.gain.exponentialRampToValueAtTime(0.001, t+0.75); s.start(t+0.05); s.stop(t+0.8);
      // Bright victory note sequence
      [784, 988, 1175, 1568, 2093].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type = 'sine';
        o.frequency.value = f;
        const d2 = t + 0.18 + i*0.09;
        g.gain.setValueAtTime(0, d2); g.gain.linearRampToValueAtTime(SOUND_VOL*0.11, d2+0.01);
        g.gain.exponentialRampToValueAtTime(0.001, d2+0.22); o.start(d2); o.stop(d2+0.25);
      });
    }

    // ─── Big Gift sound: dramatic purple-gold rising chord + shimmer
    function playBigGiftSound() {
      if (!SOUND_ENABLED) return;
      const ctx = getACtx(), t = ctx.currentTime;
      // Deep sub-bass pulse
      const sub = ctx.createOscillator(), sg = ctx.createGain();
      sub.connect(sg); sg.connect(ctx.destination); sub.type = 'sine';
      sub.frequency.setValueAtTime(80, t); sub.frequency.exponentialRampToValueAtTime(50, t + 0.3);
      sg.gain.setValueAtTime(SOUND_VOL * 0.5, t); sg.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      sub.start(t); sub.stop(t + 0.5);
      // Purple synth chord (minor third feel)
      [220, 277, 330, 415, 554].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain(), fi = ctx.createBiquadFilter();
        fi.type = 'lowpass'; fi.frequency.value = 2600;
        o.connect(fi); fi.connect(g); g.connect(ctx.destination); o.type = 'sawtooth';
        o.frequency.setValueAtTime(f, t + i * 0.04);
        g.gain.setValueAtTime(0, t + i * 0.04);
        g.gain.linearRampToValueAtTime(SOUND_VOL * 0.10, t + i * 0.04 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55 + i * 0.07);
        o.start(t + i * 0.04); o.stop(t + 0.75);
      });
      // Golden shimmer sweep
      const sw = ctx.createOscillator(), swg = ctx.createGain();
      sw.connect(swg); swg.connect(ctx.destination); sw.type = 'sine';
      sw.frequency.setValueAtTime(800, t + 0.08); sw.frequency.exponentialRampToValueAtTime(3200, t + 0.55);
      swg.gain.setValueAtTime(0, t + 0.08); swg.gain.linearRampToValueAtTime(SOUND_VOL * 0.12, t + 0.14);
      swg.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
      sw.start(t + 0.08); sw.stop(t + 0.7);
      // Bright ding on top
      const ding = ctx.createOscillator(), dg = ctx.createGain();
      ding.connect(dg); dg.connect(ctx.destination); ding.type = 'sine';
      ding.frequency.value = 2637;
      dg.gain.setValueAtTime(0, t + 0.05); dg.gain.linearRampToValueAtTime(SOUND_VOL * 0.14, t + 0.07);
      dg.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      ding.start(t + 0.05); ding.stop(t + 0.5);
    }

    function playGiftSound(coins) {
      if (!SOUND_ENABLED) return;
      const vol = SOUND_VOL;
      const id = coins < 100 ? SOUND_MAP.small : coins <= 150 ? SOUND_MAP.mid : SOUND_MAP.big;
      SOUNDS[id]?.(vol);
    }

    // ─── Sound caller for streak start

    /* ═══════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════ */
    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function fmtCoins(n) { return n >= 1000 ? (n / 1000).toFixed(1).replace('.0', '') + 'K' : n; }
    function setStatus(state, msg) {
      console.log(`[Status] ${state}: ${msg}`);
    }
    function dur() { return urlDur; }

    /* ═══════════════════════════════════════
       FIRE EFFECT
    ═══════════════════════════════════════ */
    function addFire(card, coins) {
      if (coins < FIRE_T1) return;
      const tier = coins < FIRE_T2 ? 1 : coins < FIRE_T3 ? 2 : 3;
      const count = tier === 1 ? 9 : tier === 2 ? 15 : 24;
      card.classList.add(`fire-t${tier}`);

      // Append to #fire-overlay (NOT the card) to escape the card's
      // backdrop-filter / will-change compositing layer that clips overflow in OBS
      const overlay = document.getElementById('fire-overlay');
      const wrap = document.createElement('div');
      wrap.className = `fire-wrap fire-t${tier}`;
      // Will be positioned via fixed coords after layout
      wrap.style.cssText = 'position:fixed;height:0px;pointer-events:none;overflow:visible;z-index:1001;';

      // Build flames using card width once we know it (after layout)
      requestAnimationFrame(() => {
        const rect = card.getBoundingClientRect();
        const W = rect.width || 460;
        wrap.style.left = rect.left + 'px';
        wrap.style.bottom = (window.innerHeight - rect.bottom + 2) + 'px';
        wrap.style.width = W + 'px';

        for (let i = 0; i < count; i++) {
          const fl = document.createElement('div');
          fl.className = 'flame';
          const sb = tier === 1 ? 7 : tier === 2 ? 11 : 15, sv = tier === 1 ? 5 : tier === 2 ? 8 : 12;
          const rb = tier === 1 ? 36 : tier === 2 ? 56 : 82, rv = tier === 1 ? 22 : tier === 2 ? 36 : 56;
          const fw = sb + Math.random() * sv, fh = fw * (1.5 + Math.random() * 0.8);
          const frise = -(rb + Math.random() * rv), fmax = frise * 1.4;
          const fdur = 0.6 + Math.random() * 0.7, fdelay = Math.random() * fdur;
          fl.style.cssText = `left:${4 + Math.random() * (W - 20)}px;--fw:${fw}px;--fh:${fh}px;--frise:${frise}px;--fmax:${fmax}px;--fdur:${fdur}s;--fdelay:${fdelay}s;--frot:${(Math.random() - .5) * 25}deg;--fblur:${0.5 + Math.random() * 1.5}px;`;
          wrap.appendChild(fl);
        }
      });

      overlay.appendChild(wrap);
      // Store ref so it's cleaned up when the card is removed
      card._fireWrap = wrap;
    }

    /* ═══════════════════════════════════════
       STREAK MILESTONE EFFECT
       Called when count hits 10 / 25 / 50 / 100+
    ═══════════════════════════════════════ */
    function fireStreakMilestone(card, count) {
      const [t1, t2, t3, t4] = STREAK_THRESHOLDS;
      const tier = count >= t4 ? 's4' : count >= t3 ? 's3' : count >= t2 ? 's2' : 's1';
      const colors = { s1: '#ff9a3c', s2: '#ff5555', s3: '#cc44ff', s4: '#ffd700' };
      const labels = { s1: STREAK_LABELS[0], s2: STREAK_LABELS[1], s3: STREAK_LABELS[2], s4: STREAK_LABELS[3] };
      const sizes = { s1: '42px', s2: '52px', s3: '62px', s4: '78px' };
      const emojis = { s1: '', s2: ' 🔥', s3: ' ⚡', s4: ' 💥' };
      const c = colors[tier];
      const container = document.getElementById('alert-container');

      // Remove old tier classes, add new
      card.classList.remove('streak-s1', 'streak-s2', 'streak-s3', 'streak-s4');
      card.classList.add(`streak-${tier}`);

      // Remove old streak label, add fresh one
      card.querySelectorAll('.streak-label').forEach(el => el.remove());
      const lbl = document.createElement('div');
      lbl.className = `streak-label ${tier}`;
      lbl.textContent = labels[tier];
      card.appendChild(lbl);

      // Combo fly-up
      const combo = document.createElement('div');
      combo.className = 'streak-combo';
      combo.textContent = `×${count}${emojis[tier]}`;
      combo.style.cssText = `--combo-size:${sizes[tier]};--combo-color:${c};`;
      card.appendChild(combo);
      setTimeout(() => combo.remove(), 1600);

      // Shockwave rings
      const rings = tier === 's1' ? 1 : tier === 's2' ? 2 : tier === 's3' ? 3 : 4;
      for (let i = 0; i < rings; i++) {
        const sw = document.createElement('div');
        sw.className = 'shockwave';
        sw.style.cssText = `--sw-color:${c};--sw-dur:${0.65 + i * 0.15}s;animation-delay:${i * 0.13}s;`;
        card.appendChild(sw);
        setTimeout(() => sw.remove(), 1300);
      }

      // Lightning bolts (s2+)
      if (tier !== 's1') {
        const bcount = tier === 's2' ? 4 : tier === 's3' ? 7 : 12;
        for (let i = 0; i < bcount; i++) {
          const bolt = document.createElement('div');
          bolt.className = 'bolt';
          bolt.style.cssText = `left:${5 + Math.random() * 90}%;top:${Math.random() > 0.5 ? '-5px' : 'auto'};bottom:${Math.random() > 0.5 ? '-5px' : 'auto'};height:${30 + Math.random() * 55}px;--bolt-color:${c};--b-dur:${0.18 + Math.random() * 0.18}s;--b-delay:${i * 0.055}s;--b-rot:${(Math.random() - .5) * 44}deg;`;
          card.appendChild(bolt);
          setTimeout(() => bolt.remove(), 1100);
        }
      }

      // Screen shake (s3+)
      if (SHAKE_ENABLED && (tier === 's3' || tier === 's4')) {
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 520);
      }

      // Screen flash
      const flash = document.getElementById('flash');
      flash.style.background = `radial-gradient(circle at 75% 85%, ${c}44, transparent 60%)`;
      flash.classList.add('active');
      setTimeout(() => { flash.classList.remove('active'); flash.style.background = ''; }, tier === 's4' ? 380 : 200);
    }

    /* ═══════════════════════════════════════
       ALERT QUEUE
    ═══════════════════════════════════════ */
    const queue = [];
    let activeAlerts = 0;
    // Track live streak cards: streakKey → { card, lastTier }
    const streakCards = new Map();

    // Buffer for boost/streak gifts — holds latest data until gift_end fires
    // streakKey → { username, giftName, giftId, count, coins, pictureUrl, streakKey, timer }
    const pendingStreaks = new Map();
    const STREAK_TIMEOUT_MS = 15000; // safety fallback if gift_end never arrives, increased to match server

    function enqueue(data) { queue.push(data); processQueue(); }
    function processQueue() {
      while (activeAlerts < MAX_VISIBLE_OVERRIDE && queue.length > 0) showAlert(queue.shift());
    }

    /* ═══════════════════════════════════════
       SHOW ALERT  (creates a new card)
    ═══════════════════════════════════════ */
    const BIG_GIFT_THRESHOLD = 500;

    function showAlert({ username, giftName, giftId = '', count = 1, coins, pictureUrl = '', streakKey = '', isCentury = false }) {
      const d = dur();
      const holdMs = (d - 0.45) * 1000;
      const info = getGiftInfo(giftName, giftId);
      const total = coins || (info.coins * count);
      const isBigGift = total >= BIG_GIFT_THRESHOLD; // triggers for all high value gifts
      // Use DB image as additional fallback
      const finalPic = pictureUrl || info.liveImg || '';

      // Flash
      const flash = document.getElementById('flash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 180);

      // Sound: Big Gift gets its own dramatic sound; century already played its own; use streak/normal for others
      if (SOUND_ENABLED) {
        if (isBigGift)       playBigGiftSound();
        else if (count > 1)  SOUNDS[SOUND_MAP.streak]?.(SOUND_VOL);
        else                 playGiftSound(total);
      }

      const container = document.getElementById('alert-container');
      const card = document.createElement('div');
      card.className = 'gift-alert';
      card.style.cssText = `--c1:${info.c1};--c2:${info.c2};--c1-soft:${info.c1}55;--c1-bright:${info.c1};--hold-time:${holdMs}ms;--total-time:${d}s;`;
      if (streakKey) { card.dataset.streakKey = streakKey; streakCards.set(streakKey, { card, lastTier: null }); }

      // Particles
      const pw = document.createElement('div');
      pw.className = 'particles-wrap';
      for (let i = 0; i < 11; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const sz = 3 + Math.random() * 5;
        p.style.cssText = `left:${10 + Math.random() * 80}%;bottom:${Math.random() * 40}%;--dur:${1.2 + Math.random() * 1.5}s;--delay:${Math.random() * 1.5}s;background:${Math.random() > .5 ? info.c1 : info.c2};width:${sz}px;height:${sz}px;`;
        pw.appendChild(p);
      }
      card.appendChild(pw);

      const imgHtml = finalPic
        ? `<img class="gift-img" src="${esc(finalPic)}" alt="${esc(giftName)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="gift-emoji-fallback" style="display:none">${info.emoji}</span>`
        : `<span>${info.emoji}</span>`;

      // CENTURY badge (top-right)
      const centuryBadge = isCentury
        ? `<div class="century-badge">💯 CENTURY</div>`
        : '';

      // WHALE badge (top-centre) for 500+ coin single gifts
      const whaleBadge = isBigGift
        ? `<div class="whale-badge">🐳 WHALE GIFT</div>`
        : '';

      // NEW GIFT badge for unrecognized gifts (top-left)
      const newGiftBadge = info.isNew
        ? `<div class="new-gift-badge">🆕 NEW GIFT</div>`
        : '';

      // Century cards get a golden glow override; Big Gift gets purple-gold glow
      if (isCentury) {
        card.style.boxShadow = '0 0 0 3px rgba(255,215,0,0.9), 0 16px 100px rgba(255,180,0,0.65), inset 0 1px 0 rgba(255,255,255,0.2)';
      } else if (isBigGift) {
        card.style.boxShadow = '0 0 0 2.5px rgba(192,132,252,0.9), 0 16px 80px rgba(139,92,246,0.55), 0 0 50px rgba(255,215,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15)';
      }

      card.innerHTML += `
    <div class="tiktok-mark">TIKTOK LIVE</div>
    ${centuryBadge}
    ${whaleBadge}
    ${newGiftBadge}
    <div class="alert-icon">
      ${imgHtml}
      ${count > 1 ? `<div class="count-badge">×1</div>` : ''}
    </div>
    <div class="alert-body">
      <div class="alert-username">${esc(username)}</div>
      <div class="alert-gift-name">${esc(giftName)}</div>
      <div class="alert-subtext">${esc(SUBTEXT_OVERRIDE)}</div>
    </div>
    <div class="alert-coins">
      <span class="coin-icon">🪙</span>
      <span class="coin-value">${fmtCoins(count > 1 ? Math.round(total / count) : total)}</span>
    </div>
    <div class="alert-progress"></div>
  `;

      container.appendChild(card);
      addFire(card, total);

      // Big Gift visual burst (runs after layout so getBoundingClientRect() works)
      if (isBigGift) requestAnimationFrame(() => fireBigGiftEffect(card, total));

      // STREAK ROLLUP: If it's a boost, count up slowly to reveal milestones
      if (count > 1) {
        const tempKey = 'rollup_' + Math.random();
        streakCards.set(tempKey, { card, lastTier: null });
        
        let cur = 1;
        const totalTime = 1400; // Total duration of rollup in ms
        const steps = Math.min(count, 40); // Number of increments
        const rollupInterval = totalTime / steps;
        const countStep = (count - 1) / steps;

        let lastThresholdMet = -1;

        const itv = setInterval(() => {
          const oldCur = cur;
          cur = Math.min(count, cur + countStep);
          
          // Check if we passed any thresholds during this step
          for (let i = 0; i < STREAK_THRESHOLDS.length; i++) {
            const t = STREAK_THRESHOLDS[i];
            if (oldCur < t && cur >= t) {
              // Force update to the exact threshold first for the "Boom"
              updateStreakCard({ streakKey: tempKey, count: t, giftName, coins: Math.round((total / count) * t) });
              lastThresholdMet = i;
            }
          }

          updateStreakCard({
            streakKey: tempKey,
            count: Math.floor(cur),
            coins: Math.round((total / count) * cur),
            giftName
          });

          if (cur >= count) {
            clearInterval(itv);
            streakCards.delete(tempKey);
            // Epic burst at the end of rollup if high value
            if (total >= 500) requestAnimationFrame(() => fireEpicBurst(count, giftName));
          }
        }, rollupInterval);

      } else {
        // Single gift Epic burst if high value
        if (total >= 500) requestAnimationFrame(() => fireEpicBurst(count, giftName));
      }

      activeAlerts++;

      setTimeout(() => {
        if (card._fireWrap) card._fireWrap.remove();
        card.remove();
        if (streakKey) streakCards.delete(streakKey);
        activeAlerts--;
        processQueue();
      }, d * 1000 + 100);
    }

    /* Helper: return the streak tier string for a given count */
    function getStreakTier(count) {
      const [t1, t2, t3, t4] = STREAK_THRESHOLDS;
      if (count >= t4) return 's4';
      if (count >= t3) return 's3';
      if (count >= t2) return 's2';
      if (count >= t1) return 's1';
      return null;
    }

    /* ═══════════════════════════════════════
       UPDATE STREAK CARD  (live count update)
    ═══════════════════════════════════════ */
    function updateStreakCard({ streakKey, count, coins, giftName }) {
      const entry = streakCards.get(streakKey);
      if (!entry) return; // card not on screen yet
      const { card } = entry;

      const info = getGiftInfo(giftName);
      const total = coins || (info.coins * count);

      // Update or create count badge
      let badge = card.querySelector('.count-badge');
      if (badge) {
        badge.textContent = `×${count}`;
      } else if (count > 1) {
        badge = document.createElement('div');
        badge.className = 'count-badge';
        badge.textContent = `×${count}`;
        const icon = card.querySelector('.alert-icon');
        if (icon) icon.appendChild(badge);
      }

      // Bump badge animation
      if (badge) {
        badge.style.animation = 'none';
        void badge.offsetWidth;
        badge.style.animation = 'badgeBump 0.2s cubic-bezier(0.34,2,0.64,1)';
      }

      // Update coin value
      const coinEl = card.querySelector('.coin-value');
      if (coinEl) coinEl.textContent = fmtCoins(total);

      // Fire milestone effects when a new tier is reached
      const newTier = getStreakTier(count);
      if (newTier && newTier !== entry.lastTier) {
        // Ensure we catch ALL intermediate tiers if skipped (e.g. 1 -> 50 jump)
        const tiers = ['s1', 's2', 's3', 's4'];
        const startIdx = entry.lastTier ? tiers.indexOf(entry.lastTier) + 1 : 0;
        const endIdx = tiers.indexOf(newTier);

        for (let i = startIdx; i <= endIdx; i++) {
          const threshold = STREAK_THRESHOLDS[i];
          // Use current count for the combo fly-up if it's the latest, otherwise use threshold
          fireStreakMilestone(card, (i === endIdx) ? count : threshold);
        }

        entry.lastTier = newTier;
        streakCards.set(streakKey, entry);
        if (SOUND_ENABLED) SOUNDS[SOUND_MAP.streak]?.(SOUND_VOL);
      }
    }

    /* ═══════════════════════════════════════
       SSE CONNECTION
    ═══════════════════════════════════════ */
    let evtSource = null;

    function connectProxy() {
      // Default to same origin (works when OBS loads this page directly from the Express server)
      const base = urlProxy.replace(/\/$/, '') || window.location.origin;
      if (!base) { setStatus('error', 'No proxy URL'); return; }
      if (evtSource) { evtSource.close(); evtSource = null; }
      setStatus('connecting', 'Connecting…');
      console.log('[SSE] Connecting to:', base + '/events');
      evtSource = new EventSource(`${base}/events`);

      evtSource.addEventListener('connected', e => {
        console.log('[SSE] TikTok connected', e.data);
        setStatus('connected', '@hackystreaming • Live 🔴');
        // Re-fetch gift DB now that server is connected to TikTok
        setTimeout(() => fetchLiveGiftDb(), 5000);
      });
      evtSource.addEventListener('offline', e => { console.log('[SSE] TikTok offline', e.data); setStatus('error', 'Not live yet — waiting…'); });

      // Live gift DB pushed from server after fetchAvailableGifts() succeeds
      evtSource.addEventListener('gift_db', e => {
        try {
          const d = JSON.parse(e.data);
          if (d.db) {
            loadLiveGiftDb(d.db);
            console.log(`[SSE] gift_db received: ${d.count} gifts`);
          }
        } catch (err) { console.warn('[SSE] gift_db parse error', err); }
      });

      // New gift → if it's a streak/boost, buffer it; otherwise show immediately
      evtSource.addEventListener('gift', e => {
        console.log('[SSE] gift received:', e.data);
        try {
          const d = JSON.parse(e.data);
          const sk = d.streakKey || '';
          if (sk) {
            // Boost gift — buffer and wait for gift_end
            bufferStreakGift({
              username: d.nickname || d.uniqueId || 'Someone',
              giftName: d.giftName || 'Gift',
              giftId: d.giftId || '',
              count: d.count || 1,
              coins: d.coins || null,
              pictureUrl: d.pictureUrl || '',
              streakKey: sk,
            });
          } else {
            // Single gift — show right away
            enqueue({
              username: d.nickname || d.uniqueId || 'Someone',
              giftName: d.giftName || 'Gift',
              giftId: d.giftId || '',
              count: d.count || 1,
              coins: d.coins || null,
              pictureUrl: d.pictureUrl || '',
              streakKey: '',
            });
          }
        } catch (err) { console.warn('[SSE] gift parse error', err); }
      });

      // Streak tick → update buffered data silently (card not shown yet)
      evtSource.addEventListener('gift_update', e => {
        console.log('[SSE] gift_update received:', e.data);
        try {
          const d = JSON.parse(e.data);
          const sk = d.streakKey;
          if (sk && pendingStreaks.has(sk)) {
            // Update the buffered entry with latest count/coins
            const entry = pendingStreaks.get(sk);
            entry.count = d.count || entry.count;
            entry.coins = d.coins || entry.coins;
            if (d.giftName) entry.giftName = d.giftName;
          } else if (sk) {
            // Card is already on screen — update it live (shouldn't happen in new flow,
            // but kept as a safety net)
            updateStreakCard({
              streakKey: sk,
              count: d.count,
              coins: d.coins,
              giftName: d.giftName || 'Gift',
            });
          }
        } catch (err) { console.warn('[SSE] gift_update parse error', err); }
      });

      // Streak ended — now show the alert with the final total
      evtSource.addEventListener('gift_end', e => {
        try {
          const d = JSON.parse(e.data);
          const sk = d.streakKey;
          if (sk && pendingStreaks.has(sk)) {
            flushStreakGift(sk, d.count, d.coins);
          } else {
            // Card already on screen — just update the final numbers
            const entry = streakCards.get(sk);
            if (entry) {
              const badge = entry.card.querySelector('.count-badge');
              if (badge) badge.textContent = `×${d.count}`;
              const coinEl = entry.card.querySelector('.coin-value');
              if (coinEl) coinEl.textContent = fmtCoins(d.coins);
            }
          }
        } catch (err) { console.warn('[SSE] gift_end parse error', err); }
      });

      evtSource.onerror = (err) => { console.error('[SSE] Connection error:', err); setStatus('error', 'Connection lost — retrying…'); };
    }

    // Auto-connect on load (moved to end of script for safety)

    /* ═══════════════════════════════════════
       LOCAL TEST BUTTONS
    ═══════════════════════════════════════ */
    const SINGLE_GIFTS = [
      { username: 'NightOwl', giftName: 'Rose', count: 1, coins: 5, pictureUrl: 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/eba3a9bb85c33e017f3648eaf88d7189~tplv-obj.png' },
      { username: 'CosmicVibes', giftName: 'Diamond', count: 1, coins: 5000, pictureUrl: 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/3f02fa9594bd1495ff4e8aa5ae265eef~tplv-obj.png' },
      { username: 'PixelPrince', giftName: 'Lion', count: 1, coins: 29999, pictureUrl: 'https://p16-webcast.tiktokcdn.com/img/alisg/webcast-sg/resource/77f6ab69b0b03bda98a0a3d2bfdeb46f.png~tplv-obj.png' },
      { username: 'TikTokQueen', giftName: 'Universe', count: 1, coins: 34999, pictureUrl: 'https://p16-webcast.tiktokcdn.com/img/alisg/webcast-sg/resource/e9cafce8279220ed26016a71076d6a8a.png~tplv-obj.png' },
    ];
    let singleIdx = 0;
    function testSingle() {
      const g = SINGLE_GIFTS[singleIdx++ % SINGLE_GIFTS.length];
      enqueue({ ...g, streakKey: '' });
    }

    // Test 500-coin Big Gift
    function testBigGift() {
      const g = {
        username: 'WhaleKing',
        giftName: 'Crown',
        giftId: '',
        count: 1,
        coins: 500,
        pictureUrl: '',
        streakKey: '',
      };
      enqueue(g);
    }

    // Test 100-boost Century mode
    function testCentury() {
      const streakKey = `century_${Date.now()}`;
      const giftName = 'Rose';
      const pictureUrl = 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/eba3a9bb85c33e017f3648eaf88d7189~tplv-obj.png';
      const finalCount = 100;
      bufferStreakGift({ username: 'CenturyKing', giftName, count: 1, coins: 1, pictureUrl, streakKey });
      let step = 2;
      const iv = setInterval(() => {
        if (step > finalCount) {
          clearInterval(iv);
          flushStreakGift(streakKey, finalCount, finalCount);
          return;
        }
        const entry = pendingStreaks.get(streakKey);
        if (entry) { entry.count = step; entry.coins = step; }
        step++;
      }, 40);
    }

    // Simulate a live streak locally (no server needed)
    // Mirrors the new buffered flow: buffer → updates → gift_end → show alert
    function testStreakLocal(finalCount = 50) {
      const streakKey = `local_${Date.now()}`;
      const giftName = 'Rose';
      const pictureUrl = 'https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/eba3a9bb85c33e017f3648eaf88d7189~tplv-obj.png';

      // Step 1: buffer with count=1 (like a real gift event)
      bufferStreakGift({ username: 'StreakMaster', giftName, count: 1, coins: 1, pictureUrl, streakKey });

      // Step 2: stream silent updates every 40ms (like real gift_update events)
      let step = 2;
      const iv = setInterval(() => {
        if (step > finalCount) {
          clearInterval(iv);
          // Step 3: gift_end fires — NOW show the alert with final count
          flushStreakGift(streakKey, finalCount, finalCount);
          return;
        }
        // Update buffered entry silently
        const entry = pendingStreaks.get(streakKey);
        if (entry) { entry.count = step; entry.coins = step; }
        step++;
      }, 40);
    }

    function testStreak100() { testStreakLocal(100); }

    // AUTO-CONNECT
    // Connect immediately if we have a proxy or are in OBS mode
    if (OBS_MODE || urlProxy || window.location.port) {
      setTimeout(connectProxy, 300);
    }

    /* ═══════════════════════════════════════
       BOOST GIFT BUFFERING
       Hold streak/boost gifts until gift_end fires,
       then reveal the alert with the final count.
    ═══════════════════════════════════════ */
    function bufferStreakGift(data) {
      const { streakKey } = data;
      if (pendingStreaks.has(streakKey)) {
        // Already buffered — just update the latest data
        const entry = pendingStreaks.get(streakKey);
        entry.count = data.count;
        entry.coins = data.coins;
        return;
      }
      // First time seeing this streakKey — store it and set a safety timer
      const timer = setTimeout(() => {
        // gift_end never arrived — show what we have as a fallback
        flushStreakGift(streakKey, null, null);
      }, STREAK_TIMEOUT_MS);
      pendingStreaks.set(streakKey, { ...data, timer });
    }

    /* Century threshold — configurable from dashboard */
    let CENTURY_THRESHOLD = 100;

    function flushStreakGift(streakKey, finalCount, finalCoins) {
      const entry = pendingStreaks.get(streakKey);
      if (!entry) return;
      clearTimeout(entry.timer);
      pendingStreaks.delete(streakKey);

      // Use final values from gift_end if available; fall back to last buffered update
      const count = finalCount != null ? finalCount : entry.count;
      const coins = finalCoins != null ? finalCoins : entry.coins;

      // Now enqueue the alert — card is shown AFTER boost is complete
      // Pass isCentury so the card can display the badge and trigger burst
      enqueue({ ...entry, count, coins, streakKey: '', isCentury: count >= CENTURY_THRESHOLD });
    }

    /* ═══════════════════════════════════════
       BIG GIFT EFFECT  —  500+ coin visual celebration
    ═══════════════════════════════════════ */
    function fireBigGiftEffect(card, total) {
      // ── 1. Gold shimmer sweep across the card ──
      const sweep = document.createElement('div');
      sweep.className = 'big-gift-sweep';
      // Insert BEFORE other children so it's behind content but inside card
      card.insertBefore(sweep, card.firstChild);
      setTimeout(() => sweep.remove(), 1200);

      // ── 2. Orbiting sparkle dots around the icon ──
      const icon = card.querySelector('.alert-icon');
      if (icon) {
        const DOT_COLORS = ['#ffd700','#c084fc','#fff700','#ff9a3c','#00cfff','#ff80ab'];
        const DOT_SIZES  = [5, 7, 4, 6, 5, 8];
        const DOT_RADII  = [52, 60, 48, 57, 50, 63];
        const BASE_DUR   = 2.3;
        for (let i = 0; i < 6; i++) {
          const dot = document.createElement('div');
          dot.className = 'orbit-dot';
          const dotDur = BASE_DUR + (i % 3) * 0.3;
          // negative delay offsets the starting angle: fraction * duration = time into animation
          const startFraction = i / 6; // 0, 0.167, 0.333, 0.5, 0.667, 0.833
          dot.style.cssText = [
            `--od-size:${DOT_SIZES[i]}px`,
            `--od-color:${DOT_COLORS[i]}`,
            `--od-r:${DOT_RADII[i]}px`,
            `--od-dur:${dotDur}s`,
            `--od-delay:-${(startFraction * dotDur).toFixed(2)}s`
          ].join(';');
          icon.appendChild(dot);
        }
        // Dots are removed automatically when the card is removed
      }

      // ── 3. Coin burst — 20 particles fly outward from card centre ──
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const COIN_COUNT = total >= 1000 ? 32 : 20;
      for (let i = 0; i < COIN_COUNT; i++) {
        const coin = document.createElement('div');
        coin.className = 'big-coin-p';
        const angle   = (Math.PI * 2 * i / COIN_COUNT) + (Math.random() - 0.5) * 0.6;
        const dist    = 70 + Math.random() * 110;
        const tx      = Math.cos(angle) * dist;
        const ty      = Math.sin(angle) * dist + 40; // gravity offset pulls down
        const dur2    = 0.65 + Math.random() * 0.55;
        const delay   = Math.random() * 0.2;
        const spin    = 180 + Math.random() * 360;
        coin.style.cssText = [
          `left:${cx}px`,
          `top:${cy}px`,
          `--bc-tx:${tx}px`,
          `--bc-ty:${ty}px`,
          `--bc-dur:${dur2}s`,
          `--bc-delay:${delay}s`,
          `--bc-spin:${spin}deg`
        ].join(';');
        document.body.appendChild(coin);
        setTimeout(() => coin.remove(), (dur2 + delay) * 1000 + 200);
      }

      // ── 4. Extra shockwave ring from the card itself ──
      for (let i = 0; i < 2; i++) {
        const sw = document.createElement('div');
        sw.className = 'shockwave';
        sw.style.cssText = `--sw-color:#c084fc;--sw-dur:${0.7 + i * 0.2}s;animation-delay:${i * 0.15}s;`;
        card.appendChild(sw);
        setTimeout(() => sw.remove(), 1200);
      }

      // ── 5. Screen flash (purple tint) ──
      const flash = document.getElementById('flash');
      flash.style.background = 'radial-gradient(circle at 75% 55%, rgba(139,92,246,0.32), rgba(255,215,0,0.14) 50%, transparent 72%)';
      flash.style.transition = 'opacity 0.07s ease';
      flash.classList.add('active');
      setTimeout(() => { flash.classList.remove('active'); flash.style.background = ''; }, 300);
    }

    /* ═══════════════════════════════════════
       EPIC BURST  —  full-screen celebration for 500+ coins
    ═══════════════════════════════════════ */
    const CONFETTI_COLORS = [
      '#ffd700','#ff9a3c','#ff2d55','#ff6b00',
      '#fff700','#ffffff','#ff80ab','#00cfff',
      '#c084fc','#00d26a'
    ];

    function fireEpicBurst(count, giftName) {
      playCenturySound(); // Still use the epic sound

      // ── Screen shake (multiple waves) ──
      const cont = document.getElementById('alert-container');
      [0, 150, 320].forEach(delay => {
        setTimeout(() => {
          cont.classList.add('shake');
          setTimeout(() => cont.classList.remove('shake'), 520);
        }, delay);
      });

      // ── Radial flash ──
      const flash = document.getElementById('flash');
      flash.style.background = 'radial-gradient(ellipse at center, rgba(255,215,0,0.45), rgba(255,100,0,0.25) 50%, transparent 75%)';
      flash.style.transition = 'opacity 0.06s ease';
      flash.classList.add('active');
      setTimeout(() => { flash.classList.remove('active'); flash.style.background = ''; }, 350);

      // ── Concentric shockwave rings (from screen centre) ──
      const ringColors = ['rgba(255,215,0,0.9)','rgba(255,160,0,0.7)','rgba(255,80,0,0.5)','rgba(255,220,0,0.4)'];
      ringColors.forEach((color, i) => {
        const ring = document.createElement('div');
        ring.className = 'century-ring';
        const size = 80 + i * 60;
        ring.style.cssText = [
          `left:calc(50% - ${size/2}px)`,
          `top:calc(50% - ${size/2}px)`,
          `width:${size}px`,
          `height:${size}px`,
          `--cr-color:${color}`,
          `--cr-dur:${0.9 + i * 0.18}s`,
          `--cr-delay:${i * 0.1}s`
        ].join(';');
        document.body.appendChild(ring);
        setTimeout(() => ring.remove(), (0.9 + i*0.18 + i*0.1) * 1000 + 200);
      });

      // ── 80 Confetti/firework particles ──
      const count2 = count >= 200 ? 120 : 80;
      for (let i = 0; i < count2; i++) {
        const p = document.createElement('div');
        p.className = 'century-particle';
        const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        const w = 5 + Math.random() * 9;
        const h = w * (0.5 + Math.random() * 1.8);
        const isCircle = Math.random() > 0.65;
        const xPos = 2 + Math.random() * 96; // % across screen
        const rot0 = (Math.random() - 0.5) * 180;
        const rot1 = rot0 + 180 + (Math.random() - 0.5) * 360;
        const duration = 1.5 + Math.random() * 1.8;
        const delay = Math.random() * 0.9;
        p.style.cssText = [
          `left:${xPos}vw`,
          `--cp-w:${w}px`,
          `--cp-h:${isCircle ? w : h}px`,
          `--cp-r:${isCircle ? '50%' : '3px'}`,
          `--cp-color:${color}`,
          `--cp-dur:${duration}s`,
          `--cp-delay:${delay}s`,
          `--cp-rot0:${rot0}deg`,
          `--cp-rot1:${rot1}deg`
        ].join(';');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), (duration + delay) * 1000 + 200);
      }
    }

    /* ═══════════════════════════════════════
       DASHBOARD SYNC (postMessage from dashboard.html)
    ═══════════════════════════════════════ */
    window.addEventListener('message', e => {
      const msg = e.data;
      if (!msg || !msg.type) return;

      if (msg.type === 'HACKY_CFG') {
        applyCfgFromDashboard(msg.cfg);
      }
      if (msg.type === 'HACKY_GIFT') {
        const d = msg.gift;
        const sk = d.streakKey || '';
        if (sk) {
          bufferStreakGift({
            username: d.nickname || d.uniqueId || 'Someone',
            giftName: d.giftName || 'Gift',
            count: d.count || 1,
            coins: d.coins || null,
            pictureUrl: d.pictureUrl || '',
            streakKey: sk,
          });
        } else {
          enqueue({
            username: d.nickname || d.uniqueId || 'Someone',
            giftName: d.giftName || 'Gift',
            count: d.count || 1,
            coins: d.coins || null,
            pictureUrl: d.pictureUrl || '',
            streakKey: '',
          });
        }
      }
      if (msg.type === 'HACKY_GIFT_UPDATE') {
        const d = msg.data;
        if (d.streakKey && pendingStreaks.has(d.streakKey)) {
          const entry = pendingStreaks.get(d.streakKey);
          entry.count = d.count || entry.count;
          entry.coins = d.coins || entry.coins;
        } else {
          updateStreakCard(msg.data);
        }
      }
      if (msg.type === 'HACKY_GIFT_END') {
        const d = msg.data;
        if (d.streakKey && pendingStreaks.has(d.streakKey)) {
          flushStreakGift(d.streakKey, d.count, d.coins);
        } else {
          const entry = streakCards.get(d.streakKey);
          if (entry) {
            const badge = entry.card.querySelector('.count-badge');
            if (badge) badge.textContent = `×${d.count}`;
            const coinEl = entry.card.querySelector('.coin-value');
            if (coinEl) coinEl.textContent = fmtCoins(d.coins);
          }
        }
      }
    });

    /* Apply config received from dashboard */
    function applyCfgFromDashboard(c) {
      if (!c) return;
      // Card dimensions
      document.documentElement.style.setProperty('--dash-card-min', (c.cardWidth || 460) + 'px');
      document.documentElement.style.setProperty('--dash-radius', (c.radius || 26) + 'px');
      document.documentElement.style.setProperty('--dash-blur', (c.blur || 22) + 'px');

      // Dynamic CSS injection
      let style = document.getElementById('dash-style');
      if (!style) { style = document.createElement('style'); style.id = 'dash-style'; document.head.appendChild(style); }

      // Position map
      const posMap = {
        tl: 'top:40px;left:40px;right:auto;bottom:auto;align-items:flex-start',
        tc: 'top:40px;left:50%;transform:translateX(-50%);right:auto;bottom:auto;align-items:center',
        tr: 'top:40px;right:40px;left:auto;bottom:auto;align-items:flex-end',
        ml: 'top:50%;left:40px;transform:translateY(-50%);right:auto;bottom:auto;align-items:flex-start',
        mc: 'top:50%;left:50%;transform:translate(-50%,-50%);right:auto;bottom:auto;align-items:center',
        mr: 'top:50%;right:40px;transform:translateY(-50%);left:auto;bottom:auto;align-items:flex-end',
        bl: 'bottom:40px;left:40px;top:auto;right:auto;align-items:flex-start',
        bc: 'bottom:40px;left:50%;transform:translateX(-50%);top:auto;right:auto;align-items:center',
        br: 'bottom:40px;right:40px;top:auto;left:auto;align-items:flex-end',
      };
      const pos = posMap[c.position || 'tr'] || posMap['tr'];

      style.textContent = `
    #alert-container { ${pos}; }
    .gift-alert {
      min-width: ${c.cardWidth || 460}px;
      max-width: ${Math.round((c.cardWidth || 460) * 1.2)}px;
      border-radius: ${c.radius || 26}px;
      backdrop-filter: blur(${c.blur || 22}px);
      opacity: ${(c.opacity || 97) / 100} !important;
    }
    .gift-alert::before { border-radius: ${c.radius || 26}px; }
    .gift-alert::after  { border-radius: ${c.radius || 26}px; }
    .alert-progress     { display: ${c.progressEnabled !== false ? 'block' : 'none'}; }
    .alert-coins        { display: ${c.coinsEnabled !== false ? 'flex' : 'none'}; }
    .particles-wrap     { display: ${c.particlesEnabled !== false ? 'block' : 'none'}; }
    .alert-username     { font-size: ${c.usernameSize || 28}px; }
    .alert-gift-name    { font-size: ${c.giftNameSize || 21}px; }
    .alert-subtext      { display: block; }
    .fire-wrap          { display: ${c.fireEnabled !== false ? 'block' : 'none'} !important; }
  `;

      // Duration
      if (c.duration) {
        const inp = document.getElementById('input-duration');
        if (inp) inp.value = c.duration;
      }

      // Max alerts
      if (c.maxAlerts) MAX_VISIBLE_OVERRIDE = c.maxAlerts;

      // Subtext
      if (c.subtext) SUBTEXT_OVERRIDE = c.subtext;

      // Streak labels
      if (c.labelS1) STREAK_LABELS[0] = c.labelS1;
      if (c.labelS2) STREAK_LABELS[1] = c.labelS2;
      if (c.labelS3) STREAK_LABELS[2] = c.labelS3;
      if (c.labelS4) STREAK_LABELS[3] = c.labelS4;

      // Streak thresholds
      if (c.s1) STREAK_THRESHOLDS[0] = c.s1;
      if (c.s2) STREAK_THRESHOLDS[1] = c.s2;
      if (c.s3) STREAK_THRESHOLDS[2] = c.s3;
      if (c.s4) STREAK_THRESHOLDS[3] = c.s4;

      // Fire thresholds
      if (c.fire1) FIRE_T1 = c.fire1;
      if (c.fire2) FIRE_T2 = c.fire2;
      if (c.fire3) FIRE_T3 = c.fire3;

      // Sound config
      if (c.soundEnabled !== undefined) SOUND_ENABLED = c.soundEnabled;
      if (c.volume !== undefined) SOUND_VOL = (c.volume || 60) / 100;
      if (c.soundSmall) SOUND_MAP.small = c.soundSmall;
      if (c.soundMid) SOUND_MAP.mid = c.soundMid;
      if (c.soundBig) SOUND_MAP.big = c.soundBig;
      if (c.soundStreak) SOUND_MAP.streak = c.soundStreak;

      // Shake
      SHAKE_ENABLED = c.shakeEnabled !== false;
    }

    // Tell dashboard we're ready
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'HACKY_READY' }, '*');
    }
  </script>
